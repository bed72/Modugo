name: modugo
version: 4.2.12
homepage: https://bed72.github.io/Modugo
repository: https://github.com/bed72/Modugo
description: Modular Routing and Dependency Injection for Flutter with GetIt and GoRouter.

screenshots:
  - description: "Modugo Logo"
    path: images/logo.png
topics:
  - modugo
  - routing
  - injection
  - navigation
  - deep-linking

environment:
  sdk: ">=3.10.0 <4.0.0"
  flutter: ">=3.38.1"

dependencies:
  flutter:
    sdk: flutter

  async: ^2.13.1
  get_it: ^9.2.1
  go_router: ^17.2.0
  path_to_regexp: ^0.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  mocktail: ^1.0.4
  flutter_lints: 6.0.0
